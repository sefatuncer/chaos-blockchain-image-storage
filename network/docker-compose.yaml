# Hyperledger Fabric Network Docker Compose Configuration
# Medical Image Storage System
#
# This file defines the Docker containers for the Fabric network

version: '3.7'

volumes:
  orderer.medical-blockchain.com:
  peer0.hospital1.medical-blockchain.com:
  peer1.hospital1.medical-blockchain.com:
  peer0.hospital2.medical-blockchain.com:
  peer1.hospital2.medical-blockchain.com:
  peer0.lab.medical-blockchain.com:

networks:
  medical-network:
    name: medical-blockchain-network

services:
  # Orderer Service
  orderer.medical-blockchain.com:
    container_name: orderer.medical-blockchain.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/medical-blockchain.com/orderers/orderer.medical-blockchain.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/medical-blockchain.com/orderers/orderer.medical-blockchain.com/tls/:/var/hyperledger/orderer/tls
      - orderer.medical-blockchain.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
    networks:
      - medical-network

  # Hospital 1 - Peer 0
  peer0.hospital1.medical-blockchain.com:
    container_name: peer0.hospital1.medical-blockchain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=medical-blockchain-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital1.medical-blockchain.com
      - CORE_PEER_ADDRESS=peer0.hospital1.medical-blockchain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital1.medical-blockchain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.hospital1.medical-blockchain.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital1.medical-blockchain.com:7051
      - CORE_PEER_LOCALMSPID=Hospital1MSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.hospital1.medical-blockchain.com:9444
      - CORE_METRICS_PROVIDER=prometheus
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/hospital1.medical-blockchain.com/peers/peer0.hospital1.medical-blockchain.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/hospital1.medical-blockchain.com/peers/peer0.hospital1.medical-blockchain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.hospital1.medical-blockchain.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - 7051:7051
      - 9444:9444
    networks:
      - medical-network

  # Hospital 2 - Peer 0
  peer0.hospital2.medical-blockchain.com:
    container_name: peer0.hospital2.medical-blockchain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=medical-blockchain-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital2.medical-blockchain.com
      - CORE_PEER_ADDRESS=peer0.hospital2.medical-blockchain.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital2.medical-blockchain.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.hospital2.medical-blockchain.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital2.medical-blockchain.com:9051
      - CORE_PEER_LOCALMSPID=Hospital2MSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.hospital2.medical-blockchain.com:9445
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/hospital2.medical-blockchain.com/peers/peer0.hospital2.medical-blockchain.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/hospital2.medical-blockchain.com/peers/peer0.hospital2.medical-blockchain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.hospital2.medical-blockchain.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - 9051:9051
      - 9445:9445
    networks:
      - medical-network

  # Lab Organization - Peer 0
  peer0.lab.medical-blockchain.com:
    container_name: peer0.lab.medical-blockchain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=medical-blockchain-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.lab.medical-blockchain.com
      - CORE_PEER_ADDRESS=peer0.lab.medical-blockchain.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.lab.medical-blockchain.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.lab.medical-blockchain.com:11051
      - CORE_PEER_LOCALMSPID=LabOrgMSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.lab.medical-blockchain.com:9446
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/lab.medical-blockchain.com/peers/peer0.lab.medical-blockchain.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/lab.medical-blockchain.com/peers/peer0.lab.medical-blockchain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.lab.medical-blockchain.com:/var/hyperledger/production
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - 11051:11051
      - 9446:9446
    networks:
      - medical-network

  # CLI Container for administration
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.hospital1.medical-blockchain.com:7051
      - CORE_PEER_LOCALMSPID=Hospital1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital1.medical-blockchain.com/peers/peer0.hospital1.medical-blockchain.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital1.medical-blockchain.com/peers/peer0.hospital1.medical-blockchain.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital1.medical-blockchain.com/peers/peer0.hospital1.medical-blockchain.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/hospital1.medical-blockchain.com/users/Admin@hospital1.medical-blockchain.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./chaincode/:/opt/gopath/src/github.com/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    depends_on:
      - orderer.medical-blockchain.com
      - peer0.hospital1.medical-blockchain.com
      - peer0.hospital2.medical-blockchain.com
      - peer0.lab.medical-blockchain.com
    networks:
      - medical-network
