# Hyperledger Fabric Network Configuration
# Medical Image Storage System
#
# Reference: "Integration of Chaos-Based Encryption and Blockchain for
# Tamper-Proof Medical Image Storage and Authentication"

---
Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/medical-blockchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  - &Hospital1
    Name: Hospital1MSP
    ID: Hospital1MSP
    MSPDir: crypto-config/peerOrganizations/hospital1.medical-blockchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin', 'Hospital1MSP.peer', 'Hospital1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin', 'Hospital1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Hospital1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Hospital1MSP.peer')"
    AnchorPeers:
      - Host: peer0.hospital1.medical-blockchain.com
        Port: 7051

  - &Hospital2
    Name: Hospital2MSP
    ID: Hospital2MSP
    MSPDir: crypto-config/peerOrganizations/hospital2.medical-blockchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin', 'Hospital2MSP.peer', 'Hospital2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin', 'Hospital2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Hospital2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Hospital2MSP.peer')"
    AnchorPeers:
      - Host: peer0.hospital2.medical-blockchain.com
        Port: 9051

  - &LabOrg
    Name: LabOrgMSP
    ID: LabOrgMSP
    MSPDir: crypto-config/peerOrganizations/lab.medical-blockchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('LabOrgMSP.admin', 'LabOrgMSP.peer', 'LabOrgMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('LabOrgMSP.admin', 'LabOrgMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('LabOrgMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('LabOrgMSP.peer')"
    AnchorPeers:
      - Host: peer0.lab.medical-blockchain.com
        Port: 11051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.medical-blockchain.com:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  EtcdRaft:
    Consenters:
      - Host: orderer.medical-blockchain.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/medical-blockchain.com/orderers/orderer.medical-blockchain.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/medical-blockchain.com/orderers/orderer.medical-blockchain.com/tls/server.crt
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  # Genesis block for orderer system channel
  MedicalOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      MedicalConsortium:
        Organizations:
          - *Hospital1
          - *Hospital2
          - *LabOrg

  # Channel for medical image storage
  MedicalImagesChannel:
    Consortium: MedicalConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Hospital1
        - *Hospital2
        - *LabOrg
      Capabilities:
        <<: *ApplicationCapabilities
